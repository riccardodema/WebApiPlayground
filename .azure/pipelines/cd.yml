trigger: none

pr: none

# Invoca questa pipeline da CI oppure manualmente con gli artifact già prodotti
resources:
  pipelines:
    - pipeline: ci
      source: WebApiPlayground - CI
      trigger:
        branches:
          include:
            - main

variables:
  # Variabili attese nel Variable Group WebApiPlayground-Production:
  #   AzureServiceConnection   — nome del Service Connection ARM su Azure DevOps
  #   AzureAppServiceName      — nome dell'App Service (es. webapi-playground-prod)
  #   AzureResourceGroup       — resource group dell'App Service
  #   ConnectionStrings__WebConnectionString — connection string SQL Server (da Key Vault)
  - group: WebApiPlayground-Production
  - name: dotnetVersion
    value: 10.x

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Deploy
    displayName: Deploy to Production
    jobs:
      - deployment: DeployProduction
        displayName: Deploy (Azure App Service)
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - task: UseDotNet@2
                  displayName: Install .NET $(dotnetVersion)
                  inputs:
                    packageType: sdk
                    version: $(dotnetVersion)

                - task: DownloadBuildArtifacts@0
                  displayName: Download app artifact
                  inputs:
                    buildType: specific
                    project: $(System.TeamProjectId)
                    pipeline: $(resources.pipeline.ci.pipelineID)
                    artifactName: drop
                    downloadPath: $(Pipeline.Workspace)/artifacts

                - task: DownloadBuildArtifacts@0
                  displayName: Download database artifact (DACPAC)
                  inputs:
                    buildType: specific
                    project: $(System.TeamProjectId)
                    pipeline: $(resources.pipeline.ci.pipelineID)
                    artifactName: database
                    downloadPath: $(Pipeline.Workspace)/artifacts

                # Applica lo schema PRIMA del deploy dell'app, così il DB è già
                # aggiornato quando parte il nuovo codice. SqlPackage cross-platform
                # (dotnet tool) calcola e applica il diff dal DACPAC.
                - script: |
                    dotnet tool install --global Microsoft.SqlPackage
                    export PATH="$PATH:$HOME/.dotnet/tools"
                    sqlpackage /Action:Publish \
                      /SourceFile:"$(Pipeline.Workspace)/artifacts/database/WebApiPlayground.Database.dacpac" \
                      /Profile:"$(Pipeline.Workspace)/artifacts/database/WebApiPlayground.Database.publish.xml" \
                      /TargetConnectionString:"$(ConnectionStrings__WebConnectionString)"
                  displayName: Publish database (DACPAC)

                - task: AzureWebApp@1
                  displayName: Deploy to Azure App Service
                  inputs:
                    azureSubscription: $(AzureServiceConnection)
                    appType: webApp
                    appName: $(AzureAppServiceName)
                    resourceGroupName: $(AzureResourceGroup)
                    package: $(Pipeline.Workspace)/artifacts/drop
                    appSettings: >
                      -ASPNETCORE_ENVIRONMENT Production
                      -ConnectionStrings__WebConnectionString "$(ConnectionStrings__WebConnectionString)"

                - script: |
                    echo "Health check: https://$(AzureAppServiceName).azurewebsites.net/openapi/v1.json"
                    curl --fail --retry 5 --retry-delay 5 \
                      https://$(AzureAppServiceName).azurewebsites.net/openapi/v1.json
                  displayName: Health check
