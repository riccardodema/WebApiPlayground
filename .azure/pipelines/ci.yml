trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - "**/*.md"
      - ".claude/**"

pr: none

variables:
  buildConfiguration: Release
  dotnetVersion: 10.x
  NUGET_PACKAGES: $(Pipeline.Workspace)/.nuget/packages

pool:
  vmImage: ubuntu-latest

stages:
  - stage: BuildAndTest
    displayName: Build & Test
    jobs:
      - job: CI
        displayName: CI
        steps:
          - template: ../templates/steps-restore-build.yml
            parameters:
              buildConfiguration: $(buildConfiguration)
              dotnetVersion: $(dotnetVersion)

          - template: ../templates/steps-test.yml
            parameters:
              buildConfiguration: $(buildConfiguration)
              runIntegrationTests: true

          - script: >
              dotnet publish src/WebApiPlayground.Api/WebApiPlayground.Api.csproj
              --configuration $(buildConfiguration)
              --no-build
              --output $(Build.ArtifactStagingDirectory)/app
            displayName: Publish application

          # Lo schema del DB è un SQL project (DACPAC), già compilato dal `dotnet build`
          # della solution nel template steps-restore-build. Qui impacchettiamo il
          # .dacpac e il publish profile come artifact per la pipeline CD.
          - script: |
              mkdir -p "$(Build.ArtifactStagingDirectory)/database"
              cp database/bin/$(buildConfiguration)/WebApiPlayground.Database.dacpac \
                 "$(Build.ArtifactStagingDirectory)/database/"
              cp database/WebApiPlayground.Database.publish.xml \
                 "$(Build.ArtifactStagingDirectory)/database/"
            displayName: Stage database DACPAC

          - task: PublishBuildArtifacts@1
            displayName: Publish app artifact
            inputs:
              PathtoPublish: $(Build.ArtifactStagingDirectory)/app
              ArtifactName: drop

          - task: PublishBuildArtifacts@1
            displayName: Publish database artifact (DACPAC)
            inputs:
              PathtoPublish: $(Build.ArtifactStagingDirectory)/database
              ArtifactName: database
