trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - "**/*.md"
      - ".claude/**"

pr: none

variables:
  buildConfiguration: Release
  dotnetVersion: 10.x
  NUGET_PACKAGES: $(Pipeline.Workspace)/.nuget/packages

pool:
  vmImage: ubuntu-latest

stages:
  - stage: BuildAndTest
    displayName: Build & Test
    jobs:
      - job: CI
        displayName: CI
        steps:
          - template: ../templates/steps-restore-build.yml
            parameters:
              buildConfiguration: $(buildConfiguration)
              dotnetVersion: $(dotnetVersion)

          - template: ../templates/steps-test.yml
            parameters:
              buildConfiguration: $(buildConfiguration)
              runIntegrationTests: true

          - script: >
              dotnet publish src/WebApiPlayground.Api/WebApiPlayground.Api.csproj
              --configuration $(buildConfiguration)
              --no-build
              --output $(Build.ArtifactStagingDirectory)/app
            displayName: Publish application

          - script: |
              dotnet tool install --global dotnet-ef --version 10.*
              dotnet ef migrations bundle \
                --project src/WebApiPlayground.Infrastructure/WebApiPlayground.Infrastructure.csproj \
                --startup-project src/WebApiPlayground.Api/WebApiPlayground.Api.csproj \
                --configuration $(buildConfiguration) \
                --output $(Build.ArtifactStagingDirectory)/efbundle \
                --self-contained \
                --verbose
            displayName: Build EF migrations bundle

          - task: PublishBuildArtifacts@1
            displayName: Publish app artifact
            inputs:
              PathtoPublish: $(Build.ArtifactStagingDirectory)/app
              ArtifactName: drop

          - task: PublishBuildArtifacts@1
            displayName: Publish migrations bundle artifact
            inputs:
              PathtoPublish: $(Build.ArtifactStagingDirectory)/efbundle
              ArtifactName: efbundle
