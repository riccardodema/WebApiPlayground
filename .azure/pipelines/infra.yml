# Infrastructure as Code (Bicep) — Azure DevOps.
# Speculare a .github/workflows/infra.yml: Validate (build/lint + PSRule) su PR e
# main, poi Deploy (what-if → create) gated dall'environment `production`.
#
# Auth via Service Connection ARM (AzureServiceConnection nel Variable Group).

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - infra/**
      - .azure/pipelines/infra.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - infra/**
      - .azure/pipelines/infra.yml

variables:
  # Atteso nel Variable Group WebApiPlayground-Production:
  #   AzureServiceConnection — Service Connection ARM
  #   AzureLocation          — region del deployment (es. westeurope)
  - group: WebApiPlayground-Production

pool:
  vmImage: ubuntu-latest

stages:
  # ---------------------------------------------------------------------------
  # Validazione: build/lint Bicep + PSRule for Azure. Non richiede Azure.
  # ---------------------------------------------------------------------------
  - stage: Validate
    displayName: Validate IaC
    jobs:
      - job: Validate
        displayName: Bicep build/lint + IaC tests + PSRule
        steps:
          - task: UseDotNet@2
            displayName: Install .NET 10.x
            inputs:
              packageType: sdk
              version: 10.x

          - script: az bicep install
            displayName: Setup Bicep CLI

          - script: |
              az bicep build --file infra/main.bicep --stdout > /dev/null
              az bicep build-params --file infra/main.dev.bicepparam --stdout > /dev/null
              az bicep build-params --file infra/main.prod.bicepparam --stdout > /dev/null
            displayName: Bicep build + lint

          # Unit test xUnit: compilano il Bicep in ARM e asseriscono security
          # posture e idempotenza (no Azure, no Docker).
          - script: >
              dotnet test tests/WebApiPlayground.IacTests/WebApiPlayground.IacTests.csproj
              --logger trx
              --results-directory $(Agent.TempDirectory)/TestResults/iac
            displayName: IaC unit tests (xUnit)

          - task: PublishTestResults@2
            displayName: Publish IaC test results
            condition: always()
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: $(Agent.TempDirectory)/TestResults/iac/**/*.trx
              mergeTestResults: true
              failTaskOnFailedTests: true

          - task: ps-rule-assert@2
            displayName: PSRule for Azure
            inputs:
              modules: PSRule.Rules.Azure
              inputPath: infra/
              option: infra/tests/ps-rule.yaml

  # ---------------------------------------------------------------------------
  # Deploy: what-if (anteprima) poi create (idempotente). Environment con approval.
  # ---------------------------------------------------------------------------
  - stage: Deploy
    displayName: Deploy IaC
    dependsOn: Validate
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - deployment: DeployInfra
        displayName: Deploy (subscription)
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                # Anteprima del diff PRIMA di applicare.
                - task: AzureCLI@2
                  displayName: What-if (preview)
                  inputs:
                    azureSubscription: $(AzureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az deployment sub what-if \
                        --location "$(AzureLocation)" \
                        --template-file infra/main.bicep \
                        --parameters infra/main.prod.bicepparam

                # Idempotente: riapplicare lo stesso stato è un no-op.
                - task: AzureCLI@2
                  displayName: Deploy (az deployment sub create)
                  inputs:
                    azureSubscription: $(AzureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az deployment sub create \
                        --name "webapiplay-prod-$(Build.BuildId)" \
                        --location "$(AzureLocation)" \
                        --template-file infra/main.bicep \
                        --parameters infra/main.prod.bicepparam
