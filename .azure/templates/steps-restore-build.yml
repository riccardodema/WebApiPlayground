parameters:
  - name: buildConfiguration
    type: string
    default: Release
  - name: dotnetVersion
    type: string
    default: 10.x

steps:
  - task: UseDotNet@2
    displayName: Install .NET ${{ parameters.dotnetVersion }}
    inputs:
      packageType: sdk
      version: ${{ parameters.dotnetVersion }}

  - task: Cache@2
    displayName: Cache NuGet packages
    inputs:
      key: 'nuget | "$(Agent.OS)" | **/packages.lock.json,!**/bin/**,!**/obj/**'
      restoreKeys: |
        nuget | "$(Agent.OS)"
      path: $(NUGET_PACKAGES)

  - script: dotnet restore
    displayName: Restore dependencies

  - script: dotnet build --configuration ${{ parameters.buildConfiguration }} --no-restore
    displayName: Build (${{ parameters.buildConfiguration }})
