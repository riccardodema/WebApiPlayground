parameters:
  - name: buildConfiguration
    type: string
    default: Release
  - name: runIntegrationTests
    type: boolean
    default: true

steps:
  - script: >
      dotnet test tests/WebApiPlayground.Tests/WebApiPlayground.Tests.csproj
      --configuration ${{ parameters.buildConfiguration }}
      --no-build
      --logger trx
      --results-directory $(Agent.TempDirectory)/TestResults/unit
      --collect:"XPlat Code Coverage"
      --
      DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
    displayName: Run unit tests

  - ${{ if eq(parameters.runIntegrationTests, true) }}:
    - script: >
        dotnet test tests/WebApiPlayground.IntegrationTests/WebApiPlayground.IntegrationTests.csproj
        --configuration ${{ parameters.buildConfiguration }}
        --no-build
        --logger trx
        --results-directory $(Agent.TempDirectory)/TestResults/integration
      displayName: Run integration tests
      env:
        TESTCONTAINERS_RYUK_DISABLED: false

  - task: PublishTestResults@2
    displayName: Publish test results
    condition: always()
    inputs:
      testResultsFormat: VSTest
      testResultsFiles: $(Agent.TempDirectory)/TestResults/**/*.trx
      mergeTestResults: true
      failTaskOnFailedTests: true

  - task: PublishCodeCoverageResults@2
    displayName: Publish code coverage
    condition: succeededOrFailed()
    inputs:
      summaryFileLocation: $(Agent.TempDirectory)/TestResults/unit/**/coverage.cobertura.xml
