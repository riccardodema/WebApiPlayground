parameters:
  - name: buildConfiguration
    type: string
    default: Release
  - name: runIntegrationTests
    type: boolean
    default: true

steps:
  - script: >
      dotnet test tests/WebApiPlayground.Tests/WebApiPlayground.Tests.csproj
      --configuration ${{ parameters.buildConfiguration }}
      --no-build
      --logger trx
      --results-directory $(Agent.TempDirectory)/TestResults/unit
      --settings tests/coverlet.runsettings
      --collect:"XPlat Code Coverage"
    displayName: Run unit tests

  # Architecture tests (NetArchTest): fanno rispettare le regole di layering
  # documentate in .claude/context/architecture.md. Veloci, nessun DB/Docker.
  - script: >
      dotnet test tests/WebApiPlayground.ArchitectureTests/WebApiPlayground.ArchitectureTests.csproj
      --configuration ${{ parameters.buildConfiguration }}
      --no-build
      --logger trx
      --results-directory $(Agent.TempDirectory)/TestResults/architecture
    displayName: Run architecture tests

  - ${{ if eq(parameters.runIntegrationTests, true) }}:
    - script: >
        dotnet test tests/WebApiPlayground.IntegrationTests/WebApiPlayground.IntegrationTests.csproj
        --configuration ${{ parameters.buildConfiguration }}
        --no-build
        --logger trx
        --results-directory $(Agent.TempDirectory)/TestResults/integration
        --settings tests/coverlet.runsettings
        --collect:"XPlat Code Coverage"
      displayName: Run integration tests
      env:
        TESTCONTAINERS_RYUK_DISABLED: false

    # Docker tests: contract test statici su Dockerfile/compose + smoke test LIVE che builda
    # l'immagine API e colpisce /health/live (vale anche da validazione del `docker build`).
    # Stesso requisito di Docker degli integration test (Testcontainers).
    - script: >
        dotnet test tests/WebApiPlayground.DockerTests/WebApiPlayground.DockerTests.csproj
        --configuration ${{ parameters.buildConfiguration }}
        --no-build
        --logger trx
        --results-directory $(Agent.TempDirectory)/TestResults/docker
      displayName: Run docker tests
      env:
        TESTCONTAINERS_RYUK_DISABLED: false

  - task: PublishTestResults@2
    displayName: Publish test results
    condition: always()
    inputs:
      testResultsFormat: VSTest
      testResultsFiles: $(Agent.TempDirectory)/TestResults/**/*.trx
      mergeTestResults: true
      failTaskOnFailedTests: true

  - task: PublishCodeCoverageResults@2
    displayName: Publish code coverage
    condition: succeededOrFailed()
    inputs:
      summaryFileLocation: $(Agent.TempDirectory)/TestResults/**/coverage.cobertura.xml
