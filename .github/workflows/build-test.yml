# Reusable workflow: restore, build, test and (optionally) produce deploy artifacts.
# Called by pr-validation.yml (PR gate) and ci-cd.yml (push to main).
# Mirrors the Azure DevOps templates in .azure/templates/.
name: build-test

on:
  workflow_call:
    inputs:
      build-configuration:
        type: string
        default: Release
      upload-artifacts:
        description: When true, publishes the app + DACPAC as artifacts for deployment.
        type: boolean
        default: false
      mutation-incremental:
        description: >
          When true (PR gate), runs Stryker.NET mutation testing on the files CHANGED vs the
          target branch only (fast). The FULL run is manual-only via mutation-full.yml —
          deliberately no scheduled runs on this repo.
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history: Stryker --since diffs against the PR target branch.
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Cache NuGet without requiring a lock file (key on the project files).
      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      # Builds the whole solution, including the SQL project => produces the DACPAC.
      - name: Build (${{ inputs.build-configuration }})
        run: dotnet build --configuration ${{ inputs.build-configuration }} --no-restore

      # Coverage is collected on the two suites that EXECUTE src code (unit + integration) and
      # merged below; the runsettings scope it to production assemblies only.
      - name: Unit tests
        run: >
          dotnet test tests/WebApiPlayground.Tests/WebApiPlayground.Tests.csproj
          --configuration ${{ inputs.build-configuration }} --no-build
          --logger "trx;LogFileName=unit.trx"
          --results-directory TestResults
          --settings tests/coverlet.runsettings
          --collect "XPlat Code Coverage"

      # Architecture tests (NetArchTest): fanno rispettare le regole di layering
      # documentate in .claude/context/architecture.md. Veloci, nessun DB/Docker.
      - name: Architecture tests
        run: >
          dotnet test tests/WebApiPlayground.ArchitectureTests/WebApiPlayground.ArchitectureTests.csproj
          --configuration ${{ inputs.build-configuration }} --no-build
          --logger "trx;LogFileName=architecture.trx"
          --results-directory TestResults

      # Integration tests use Testcontainers.MsSql; Docker is available on
      # GitHub-hosted ubuntu runners out of the box, so no service container needed.
      - name: Integration tests
        run: >
          dotnet test tests/WebApiPlayground.IntegrationTests/WebApiPlayground.IntegrationTests.csproj
          --configuration ${{ inputs.build-configuration }} --no-build
          --logger "trx;LogFileName=integration.trx"
          --results-directory TestResults
          --settings tests/coverlet.runsettings
          --collect "XPlat Code Coverage"

      # Docker tests: contract test statici su Dockerfile/compose + smoke test LIVE che builda
      # l'immagine API e colpisce /health/live (vale anche da validazione del `docker build`).
      # Docker è disponibile su ubuntu-latest, come per Testcontainers.
      - name: Docker tests
        run: >
          dotnet test tests/WebApiPlayground.DockerTests/WebApiPlayground.DockerTests.csproj
          --configuration ${{ inputs.build-configuration }} --no-build
          --logger "trx;LogFileName=docker.trx"
          --results-directory TestResults

      # ---- Coverage: merge + RATCHET gate --------------------------------------
      # Il gate legge le soglie versionate in tests/coverage-thresholds.json: partono dalla
      # baseline misurata e possono solo salire — una PR che fa scendere la coverage fallisce.
      - name: Coverage report (merge unit + integration)
        run: |
          dotnet tool restore
          dotnet tool run reportgenerator \
            -reports:"TestResults/**/coverage.cobertura.xml" \
            -targetdir:CoverageReport \
            -reporttypes:"Html;JsonSummary;MarkdownSummaryGithub"

      - name: Coverage gate (ratchet)
        run: |
          line=$(jq -r '.summary.linecoverage' CoverageReport/Summary.json)
          branch=$(jq -r '.summary.branchcoverage' CoverageReport/Summary.json)
          min_line=$(jq -r '.line' tests/coverage-thresholds.json)
          min_branch=$(jq -r '.branch' tests/coverage-thresholds.json)
          echo "Line coverage:   ${line}% (gate: ${min_line}%)"
          echo "Branch coverage: ${branch}% (gate: ${min_branch}%)"
          cat CoverageReport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
          awk -v l="$line" -v ml="$min_line" -v b="$branch" -v mb="$min_branch" \
            'BEGIN { exit !(l >= ml && b >= mb) }' || {
            echo "::error::Coverage sotto il gate ratchet (line ${line}% < ${min_line}% oppure branch ${branch}% < ${min_branch}%). Aggiungi test o motiva l'abbassamento in tests/coverage-thresholds.json."
            exit 1
          }

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: CoverageReport

      # ---- Mutation testing (Stryker.NET, INCREMENTALE) ------------------------
      # Solo sui file cambiati rispetto al target della PR: verifica che i test del codice toccato
      # uccidano i mutanti. Run per-progetto orchestrate da tests/run-mutation.sh (mai solution
      # mode: arruolerebbe anche gli integration test coi container — [L29]). La run completa è
      # manuale (mutation-full.yml) — niente schedulazioni.
      - name: Mutation tests (changed files only)
        if: ${{ inputs.mutation-incremental && github.base_ref != '' }}
        run: ./tests/run-mutation.sh --since:origin/${{ github.base_ref }} --break-at 60

      - name: Upload mutation report
        if: ${{ always() && inputs.mutation-incremental }}
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report-incremental
          path: tests/WebApiPlayground.Tests/StrykerOutput/**/reports
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/**/*.trx
          if-no-files-found: ignore

      # ---- Deployment artifacts (only on CI for main) -------------------------
      - name: Publish application
        if: ${{ inputs.upload-artifacts }}
        run: >
          dotnet publish src/WebApiPlayground.Api/WebApiPlayground.Api.csproj
          --configuration ${{ inputs.build-configuration }} --no-build
          --output artifacts/app

      - name: Stage database DACPAC
        if: ${{ inputs.upload-artifacts }}
        run: |
          mkdir -p artifacts/database
          cp "database/bin/${{ inputs.build-configuration }}/WebApiPlayground.Database.dacpac" artifacts/database/
          cp "database/WebApiPlayground.Database.publish.xml" artifacts/database/

      - name: Upload app artifact
        if: ${{ inputs.upload-artifacts }}
        uses: actions/upload-artifact@v7
        with:
          name: app
          path: artifacts/app

      - name: Upload database artifact (DACPAC)
        if: ${{ inputs.upload-artifacts }}
        uses: actions/upload-artifact@v7
        with:
          name: database
          path: artifacts/database
