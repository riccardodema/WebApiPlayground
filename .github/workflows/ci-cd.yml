# CI/CD on push to main: build + test (with artifacts), then deploy to Azure.
# Equivalent of .azure/pipelines/ci.yml + cd.yml combined into one run.
#
# The `deploy` job targets the `production` GitHub Environment, which provides the
# manual approval gate and scopes the deployment secrets. Azure auth uses OIDC
# (federated credentials) — no long-lived secret is stored in the repo.
#
# Required configuration (see .github/workflows/README.md):
#   Secrets (Environment `production`):
#     AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID  (OIDC app registration)
#     AZURE_SQL_CONNECTION_STRING                              (target DB for DACPAC)
#   Variables (Environment `production`):
#     AZURE_WEBAPP_NAME                                        (App Service name)
name: CI/CD

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - '.claude/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/build-test.yml
    with:
      upload-artifacts: true

  # Badge di coverage SELF-HOSTED: niente servizi terzi (Codecov & co.) — il job genera due JSON
  # in formato shields-endpoint dal report di coverage e li committa sul branch `badges` (fuori da
  # main: nessun trigger di CI, nessun rumore nella history). Il README li consuma via
  # img.shields.io/endpoint. Vedi .claude/context/testing.md.
  badges:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write             # push sul branch `badges` (solo questo job ha write)
    steps:
      - uses: actions/checkout@v6

      - name: Download coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: coverage-report

      - name: Publish coverage badges to the badges branch
        run: |
          set -euo pipefail
          line=$(jq -r '.summary.linecoverage' coverage-report/Summary.json)
          branch=$(jq -r '.summary.branchcoverage' coverage-report/Summary.json)
          color() { awk -v v="$1" 'BEGIN{ print (v>=90)?"brightgreen":(v>=80)?"green":(v>=70)?"yellowgreen":(v>=60)?"yellow":"red" }'; }
          mkdir -p /tmp/badges
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}' \
            "$line" "$(color "$line")" > /tmp/badges/coverage.json
          printf '{"schemaVersion":1,"label":"branch coverage","message":"%s%%","color":"%s"}' \
            "$branch" "$(color "$branch")" > /tmp/badges/branch-coverage.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git fetch origin badges 2>/dev/null; then
            git checkout badges
          else
            git checkout --orphan badges
            git rm -rfq .
          fi
          cp /tmp/badges/*.json .
          git add ./*.json
          git commit -m "chore(badges): update coverage badges" || echo "badges unchanged"
          git push origin badges

  deploy:
    needs: ci
    # Skip the deploy entirely until an Azure target is configured (the `vars`
    # context is readable here; `secrets` is not). With no AZURE_WEBAPP_NAME set
    # the job is SKIPPED — not failed — so CI stays green with zero Azure calls.
    # Once configured, deploy auto-triggers after CI and still waits on the
    # `production` environment approval gate before touching prod (continuous delivery).
    if: ${{ vars.AZURE_WEBAPP_NAME != '' }}
    runs-on: ubuntu-latest
    environment: production          # approval gate + scoped secrets/variables
    permissions:
      id-token: write                # required for Azure OIDC login
      contents: read
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download app artifact
        uses: actions/download-artifact@v8
        with:
          name: app
          path: artifacts/app

      - name: Download database artifact (DACPAC)
        uses: actions/download-artifact@v8
        with:
          name: database
          path: artifacts/database

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Apply schema BEFORE the app, so the DB is ready when new code starts.
      - name: Publish database (DACPAC)
        run: |
          dotnet tool install --global microsoft.sqlpackage
          export PATH="$PATH:$HOME/.dotnet/tools"
          sqlpackage /Action:Publish \
            /SourceFile:artifacts/database/WebApiPlayground.Database.dacpac \
            /Profile:artifacts/database/WebApiPlayground.Database.publish.xml \
            /TargetConnectionString:"${{ secrets.AZURE_SQL_CONNECTION_STRING }}"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: artifacts/app

      - name: Health check (readiness)
        run: |
          curl --fail --retry 5 --retry-delay 5 \
            "https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net/health/ready"
