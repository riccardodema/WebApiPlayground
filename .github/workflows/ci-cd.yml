# CI/CD on push to main: build + test (with artifacts), then deploy to Azure.
# Equivalent of .azure/pipelines/ci.yml + cd.yml combined into one run.
#
# The `deploy` job targets the `production` GitHub Environment, which provides the
# manual approval gate and scopes the deployment secrets. Azure auth uses OIDC
# (federated credentials) — no long-lived secret is stored in the repo.
#
# Required configuration (see .github/workflows/README.md):
#   Secrets (Environment `production`):
#     AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID  (OIDC app registration)
#     AZURE_SQL_CONNECTION_STRING                              (target DB for DACPAC)
#   Variables (Environment `production`):
#     AZURE_WEBAPP_NAME                                        (App Service name)
name: CI/CD

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - '.claude/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/build-test.yml
    with:
      upload-artifacts: true

  deploy:
    needs: ci
    # Skip the deploy entirely until an Azure target is configured (the `vars`
    # context is readable here; `secrets` is not). With no AZURE_WEBAPP_NAME set
    # the job is SKIPPED — not failed — so CI stays green with zero Azure calls.
    # Once configured, deploy auto-triggers after CI and still waits on the
    # `production` environment approval gate before touching prod (continuous delivery).
    if: ${{ vars.AZURE_WEBAPP_NAME != '' }}
    runs-on: ubuntu-latest
    environment: production          # approval gate + scoped secrets/variables
    permissions:
      id-token: write                # required for Azure OIDC login
      contents: read
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download app artifact
        uses: actions/download-artifact@v8
        with:
          name: app
          path: artifacts/app

      - name: Download database artifact (DACPAC)
        uses: actions/download-artifact@v8
        with:
          name: database
          path: artifacts/database

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Apply schema BEFORE the app, so the DB is ready when new code starts.
      - name: Publish database (DACPAC)
        run: |
          dotnet tool install --global microsoft.sqlpackage
          export PATH="$PATH:$HOME/.dotnet/tools"
          sqlpackage /Action:Publish \
            /SourceFile:artifacts/database/WebApiPlayground.Database.dacpac \
            /Profile:artifacts/database/WebApiPlayground.Database.publish.xml \
            /TargetConnectionString:"${{ secrets.AZURE_SQL_CONNECTION_STRING }}"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: artifacts/app

      - name: Health check
        run: |
          curl --fail --retry 5 --retry-delay 5 \
            "https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net/openapi/v1.json"
