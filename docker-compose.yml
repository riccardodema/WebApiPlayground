# Stack di runtime locale completo: API + SQL Server + schema (DACPAC) seedato + emulatore
# Azure Service Bus + emulatore Azure Key Vault, con un solo comando. Diverso da Testcontainers
# (che avvia i container solo *per i test*): qui gira l'app VERA, in container, contro dipendenze
# reali — incluso il giro completo dell'outbox (publisher → coda Service Bus → consumer) e i
# SEGRETI caricati dal vault all'avvio (config provider, niente connection string nell'env
# dell'api). Vedi .claude/context/docker.md e docs/keyvault.md.
#
#   cp .env.example .env
#   docker compose up --build
#   # API + Scalar:  http://localhost:8080/scalar/v1   (l'app gira in Development)
#
# Opzionali (off di default), via file di override:
#   docker compose -f docker-compose.yml -f docker-compose.redis.yml  up   # cache L2 Redis
#   docker compose -f docker-compose.yml -f docker-compose.aspire.yml up   # telemetria OTLP

name: webapiplayground

services:
  # SQL Server. L'immagine è solo amd64: su Apple Silicon (arm64) gira in emulazione
  # (platform: linux/amd64). Vedi .claude/lessons.md [L23].
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?set MSSQL_SA_PASSWORD in .env (vedi .env.example)}
      MSSQL_PID: Developer
    ports:
      # Pubblica il DB sull'host solo per ispezionarlo con un client. L'API gli parla via rete
      # interna (db:1433), quindi questa porta non serve allo stack. È configurabile perché 1433 è
      # spesso già occupata da un SQL Server / Azure SQL Edge locale (vedi .claude/lessons.md [L23]).
      - "${SQL_HOST_PORT:-1433}:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      # $$ = escape dell'interpolazione compose: la var la espande la shell del container.
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Emulatore UFFICIALE di Azure Service Bus: stesso SDK/protocollo/semantica del cloud, in locale.
  # È il trasporto REALE dell'outbox in compose (l'app pubblica sulla coda e un consumer la consuma).
  # Riusa il container `db` come backend SQL (l'emulatore richiede un SQL Server per il suo stato) →
  # niente terzo container. La coda è dichiarata in docker/servicebus-emulator/Config.json.
  # Solo amd64: su Apple Silicon (arm64) gira in emulazione (platform). Vedi .claude/lessons.md [L23] [L24].
  servicebus:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      SQL_SERVER: db
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?set MSSQL_SA_PASSWORD in .env (vedi .env.example)}
    volumes:
      - ./docker/servicebus-emulator/Config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    ports:
      # 5672 = AMQP (dati), 5300 = management/health. Pubblicate per ispezione; l'app parla via rete interna.
      - "5672:5672"
      - "5300:5300"
    depends_on:
      db:
        condition: service_healthy

  # Emulatore COMMUNITY di Azure Key Vault (james-gould/azure-keyvault-emulator): stessa API REST/SDK
  # del cloud, in locale. È la FONTE DEI SEGRETI dello stack: l'api non riceve più connection string
  # via env ma le carica all'avvio dal vault (config provider, KeyVault__Uri + Credential=Emulator,
  # consentito solo in Development). Immagine PINNATA (supply chain); il tag di default è amd64 e su
  # Apple Silicon gira in emulazione — c'è il tag arm nativo, vedi .env.example. Vedi docs/keyvault.md.
  keyvault:
    image: jamesgoulddev/azure-keyvault-emulator:${KEYVAULT_EMULATOR_TAG:-3.1.0}
    platform: ${KEYVAULT_EMULATOR_PLATFORM:-linux/amd64}
    volumes:
      # TLS obbligatorio (l'SDK Azure pretende https): il cert self-signed lo genera keyvault-certs.
      - keyvault-certs:/certs:ro
    ports:
      # Pubblicata solo per ispezione dall'host (curl -k https://localhost:4997/...): l'api parla
      # via rete interna (keyvault:4997).
      - "4997:4997"
    depends_on:
      keyvault-certs:
        condition: service_completed_successfully
    healthcheck:
      # bash /dev/tcp: l'immagine (aspnet Debian) non ha curl. Il listener TCP basta come gate del
      # seed, che poi riprova comunque finché l'API REST non risponde.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/4997"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  # Job one-shot: genera il certificato TLS self-signed dell'emulatore Key Vault nel volume condiviso
  # (idempotente: se esiste già non fa nulla). PFX password 'emulator' = contratto dell'immagine
  # dell'emulatore, non un segreto.
  keyvault-certs:
    image: alpine/openssl:3.5.4
    entrypoint: ["/bin/sh", "/generate-cert.sh"]
    volumes:
      - keyvault-certs:/certs
      - ./docker/keyvault-emulator/generate-cert.sh:/generate-cert.sh:ro
    restart: "no"

  # Job one-shot: mette nel vault i SEGRETI che prima stavano nell'env dell'api (connection string di
  # DB ed emulatore Service Bus) via REST, come farebbe `az keyvault secret set` sul vault reale
  # (./infra/set-secrets.sh). L'api parte solo dopo che il seed è completato.
  keyvault-seed:
    image: curlimages/curl:8.16.0
    entrypoint: ["/bin/sh", "/seed-secrets.sh"]
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?set MSSQL_SA_PASSWORD in .env (vedi .env.example)}
    volumes:
      - ./docker/keyvault-emulator/seed-secrets.sh:/seed-secrets.sh:ro
    depends_on:
      keyvault:
        condition: service_healthy
    restart: "no"

  # Job one-shot: pubblica lo schema (DACPAC + seed) prima che l'API parta.
  db-migrations:
    build:
      context: ./database
    environment:
      DB_CONNECTION: "Server=db;Database=PlaygroundDatabase;User ID=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: webapiplayground:latest
    environment:
      # Development: Scalar UI + auth BYPASS (no Entra) + niente HTTPS redirect. In Production
      # l'app farebbe fail-fast senza AzureAd/connection string. Vedi .claude/lessons.md [L23].
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      # NIENTE SEGRETI QUI: le connection string (DB + emulatore Service Bus) stanno nel Key Vault
      # emulato (job keyvault-seed) e l'app le carica all'avvio col config provider. Credential
      # 'Emulator' = token mintato + TLS self-signed accettato, consentita SOLO in Development;
      # contro il vault reale si usa ManagedIdentity/AzureCli. Vedi docs/keyvault.md.
      KeyVault__Uri: "https://keyvault:4997"
      KeyVault__Credential: "Emulator"
      # Il nome della coda non è un segreto (vedi .claude/context/outbox.md): resta in env.
      ServiceBus__QueueName: "popularity-enrichment"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      db-migrations:
        condition: service_completed_successfully
      # I segreti devono essere NEL vault prima che l'app li legga allo startup.
      keyvault-seed:
        condition: service_completed_successfully
      # Best-effort: il consumer riprova comunque StartProcessing finché l'emulatore non è pronto.
      servicebus:
        condition: service_started

volumes:
  mssql-data:
  # Certificato TLS self-signed dell'emulatore Key Vault (generato da keyvault-certs, letto da keyvault).
  keyvault-certs:
