# Stack di runtime locale completo: API + SQL Server + schema (DACPAC) seedato + emulatore
# Azure Service Bus, con un solo comando. Diverso da Testcontainers (che avvia i container solo
# *per i test*): qui gira l'app VERA, in container, contro dipendenze reali — incluso il giro
# completo dell'outbox (publisher → coda Service Bus → consumer). Vedi .claude/context/docker.md.
#
#   cp .env.example .env
#   docker compose up --build
#   # API + Scalar:  http://localhost:8080/scalar/v1   (l'app gira in Development)
#
# Opzionali (off di default), via file di override:
#   docker compose -f docker-compose.yml -f docker-compose.redis.yml  up   # cache L2 Redis
#   docker compose -f docker-compose.yml -f docker-compose.aspire.yml up   # telemetria OTLP

name: webapiplayground

services:
  # SQL Server. L'immagine è solo amd64: su Apple Silicon (arm64) gira in emulazione
  # (platform: linux/amd64). Vedi .claude/lessons.md [L23].
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?set MSSQL_SA_PASSWORD in .env (vedi .env.example)}
      MSSQL_PID: Developer
    ports:
      # Pubblica il DB sull'host solo per ispezionarlo con un client. L'API gli parla via rete
      # interna (db:1433), quindi questa porta non serve allo stack. È configurabile perché 1433 è
      # spesso già occupata da un SQL Server / Azure SQL Edge locale (vedi .claude/lessons.md [L23]).
      - "${SQL_HOST_PORT:-1433}:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      # $$ = escape dell'interpolazione compose: la var la espande la shell del container.
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Emulatore UFFICIALE di Azure Service Bus: stesso SDK/protocollo/semantica del cloud, in locale.
  # È il trasporto REALE dell'outbox in compose (l'app pubblica sulla coda e un consumer la consuma).
  # Riusa il container `db` come backend SQL (l'emulatore richiede un SQL Server per il suo stato) →
  # niente terzo container. La coda è dichiarata in docker/servicebus-emulator/Config.json.
  # Solo amd64: su Apple Silicon (arm64) gira in emulazione (platform). Vedi .claude/lessons.md [L23] [L24].
  servicebus:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      SQL_SERVER: db
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?set MSSQL_SA_PASSWORD in .env (vedi .env.example)}
    volumes:
      - ./docker/servicebus-emulator/Config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    ports:
      # 5672 = AMQP (dati), 5300 = management/health. Pubblicate per ispezione; l'app parla via rete interna.
      - "5672:5672"
      - "5300:5300"
    depends_on:
      db:
        condition: service_healthy

  # Job one-shot: pubblica lo schema (DACPAC + seed) prima che l'API parta.
  db-migrations:
    build:
      context: ./database
    environment:
      DB_CONNECTION: "Server=db;Database=PlaygroundDatabase;User ID=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: webapiplayground:latest
    environment:
      # Development: Scalar UI + auth BYPASS (no Entra) + niente HTTPS redirect. In Production
      # l'app farebbe fail-fast senza AzureAd/connection string. Vedi .claude/lessons.md [L23].
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__Default: "Server=db;Database=PlaygroundDatabase;User ID=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"
      # Trasporto outbox = emulatore Service Bus (host = nome servizio "servicebus" sulla rete compose).
      # Connection string STATICA dell'emulatore (UseDevelopmentEmulator=true → SAS fissa nota). In Production
      # si usa invece ServiceBus__FullyQualifiedNamespace + managed identity (no SAS). Vedi .claude/context/outbox.md.
      ServiceBus__ConnectionString: "Endpoint=sb://servicebus;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
      ServiceBus__QueueName: "popularity-enrichment"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      db-migrations:
        condition: service_completed_successfully
      # Best-effort: il consumer riprova comunque StartProcessing finché l'emulatore non è pronto.
      servicebus:
        condition: service_started

volumes:
  mssql-data:
